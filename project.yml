name: LongScreenshotApp

targets:
  LongScreenshotApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - LongScreenshotApp/
    settings:
      base:
        INFOPLIST_FILE: LongScreenshotApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.longscreenshot.app
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: LongScreenshotApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_CN
        CFBundleDisplayName: 截长图
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: AccentColor
        NSPhotoLibraryUsageDescription: 需要访问相册以保存拼接后的长图
        NSPhotoLibraryAddUsageDescription: 需要访问相册以保存拼接后的长图

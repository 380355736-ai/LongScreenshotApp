name: Build iOS App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 生成 Xcode 项目
        run: xcodegen generate

      - name: 编译 App
        run: |
          xcodebuild build \
            -project LongScreenshotApp.xcodeproj \
            -scheme LongScreenshotApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: 查找 .app
        id: find_app
        run: |
          APP_PATH=$(find DerivedData -name "LongScreenshotApp.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found: $APP_PATH"

      - name: 验证 App 结构
        run: |
          APP="${{ steps.find_app.outputs.app_path }}"
          echo "=== App 路径: $APP ==="
          echo "=== 可执行文件 ==="
          ls -lh "$APP/LongScreenshotApp" 2>/dev/null || ls -lh "$APP"/*.exe 2>/dev/null || echo "检查可执行文件..."
          file "$APP"/* 2>/dev/null | head -5
          echo "=== Info.plist ==="
          plutil -p "$APP/Info.plist" 2>/dev/null | head -10
          echo "=== 文件列表 ==="
          ls -R "$APP" | head -30

      - name: 打包 .ipa
        run: |
          APP="${{ steps.find_app.outputs.app_path }}"
          mkdir -p Payload
          cp -R "$APP" Payload/
          # 使用 ditto 避免 macOS 资源分叉问题
          rm -f LongScreenshotApp.ipa
          ditto -c -k --sequesterRsrc --keepParent Payload LongScreenshotApp.ipa
          rm -rf Payload
          ls -lh LongScreenshotApp.ipa

      - name: 上传 .ipa
        uses: actions/upload-artifact@v4
        with:
          name: LongScreenshotApp.ipa
          path: LongScreenshotApp.ipa

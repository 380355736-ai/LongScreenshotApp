name: Build iOS App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 生成 Xcode 项目
        run: xcodegen generate

      - name: 选择 Xcode 版本
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: 编译 Archive
        run: |
          xcodebuild archive \
            -project LongScreenshotApp.xcodeproj \
            -scheme LongScreenshotApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/LongScreenshotApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: 导出 .ipa
        run: |
          mkdir -p Payload
          cp -r build/LongScreenshotApp.xcarchive/Products/Applications/LongScreenshotApp.app Payload/
          zip -r LongScreenshotApp.ipa Payload
          rm -rf Payload

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: LongScreenshotApp.ipa
          path: LongScreenshotApp.ipa
